
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WellGuard PRO X - v10.6.2</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #0a0a0b; --card: #141416; --vis-bg: #080808;
            --cyan: #00f5ff; --purple: #8b00ff; --red: #ff2d55;
            --green: #00ff9d; --yellow: #ffcc00; --btn-gray: #1f1f22;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #ddd; padding: 5px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; background: var(--card); border-radius: 15px; border: 1px solid #222; display: flex; flex-direction: column; }

        .header { 
            background: #0d0d0f; 
            padding: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #222; 
        }
        .header h1 { font-size: 0.85rem; color: var(--red ) ; letter-spacing: 1px; }
        .led-group { display: flex; gap: 8px; }
        .led-item { font-size: 0.5rem; color: #666; text-align: center; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #222; margin: 0 auto 2px; }
        #webLed.online { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
        #espLed.online { background: var(--green); box-shadow: 0 0 8px var(--green); }

        .header-buttons { display: flex; gap: 8px; align-items: center; }

        .instrument-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .instrument { background: #18181a; border-radius: 12px; padding: 10px; border: 1px solid #252525; }
        .label { font-size: 0.6rem; color: #888; margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }
        .visor-interno { background: var(--vis-bg); border-radius: 8px; padding: 5px 10px; border-top: 1px solid #000; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); }
        .display { font-size: 1.6rem; font-weight: 700; font-family: 'Courier New', monospace; color: var(--cyan); text-align: right; }

        .bar-wrap { height: 8px; background: #000; border-radius: 4px; overflow: hidden; margin-top: 5px; border: 1px solid #222; }
        .bar-fill { height: 100%; width: 0%; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, var(--green) 0%, var(--yellow) 50%, var(--red) 100%);
            background-size: 100% 100%;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }

        .card-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .alarm { width: 14px; height: 14px; border-radius: 50%; background: #111; border: 1px solid #000; }
        .alarm-on { background: var(--red); box-shadow: 0 0 12px var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }
        
        .footer-btns { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; font-size: 0.65rem; transition: 0.2s; }
        .btn-secondary { background: var(--btn-gray); color: #bbb; border: 1px solid #2a2a2a; }
        .btn-toggle { padding: 4px 8px; font-size: 0.55rem; background: #1f1f22; color: #fff; min-width: 45px; border: 1px solid #333; }
        .btn-active { background: var(--cyan); color: #000; border-color: var(--cyan); box-shadow: 0 0 8px rgba(0, 245, 255, 0.3); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #141416; padding: 20px; border-radius: 15px; width: 85%; max-width: 320px; border: 1px solid #333; }
        input { width: 100%; padding: 8px; background: #080808; border: 1px solid #2a2a2a; color: var(--cyan); margin-bottom: 8px; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>WELLGUARD PRO X</h1>
        
        <div class="header-buttons">
            <div class="led-group">
                <div class="led-item"><div id="webLed" class="led"></div>WEB</div>
                <div class="led-item"><div id="espLed" class="led"></div>ESP</div>
            </div>
            <button id="fullBtn" onclick="toggleFullscreen()" class="btn-secondary" title="Tela Cheia">⛶</button>
            <button id="muteBtn" onclick="toggleMute()" class="btn-secondary">MUTE</button>
        </div>
    </div>

    <!-- Resto da página permanece igual -->
    <div class="instrument-grid">
        <div class="instrument">
            <div class="label">GÁS (PPM)</div>
            <div class="visor-interno"><div class="display" id="gasV">0000</div><div class="bar-wrap"><div id="gasB" class="bar-fill"></div></div></div>
            <div class="card-controls">
                <button id="gasTgl" onclick="toggleSensor('gas')" class="btn-toggle btn-active">ON</button>
                <div id="gasA" class="alarm"></div>
            </div>
        </div>

        <div class="instrument">
            <div class="label">TEMP (°C)</div>
            <div class="visor-interno"><div class="display" id="tempV">0.0</div><div class="bar-wrap"><div id="tempB" class="bar-fill"></div></div></div>
            <div class="card-controls">
                <button id="tempTgl" onclick="toggleSensor('temp')" class="btn-toggle btn-active">ON</button>
                <div id="tempA" class="alarm"></div>
            </div>
        </div>

        <div class="instrument">
            <div class="label">VAZÃO (L/M)</div>
            <div class="visor-interno"><div class="display" id="flowV">0.0</div><div class="bar-wrap"><div id="flowB" class="bar-fill"></div></div></div>
            <div class="card-controls">
                <button id="flowTgl" onclick="toggleSensor('flow')" class="btn-toggle btn-active">ON</button>
                <div id="flowA" class="alarm"></div>
            </div>
        </div>

        <div class="instrument">
            <div class="label">PRESS (BAR)</div>
            <div class="visor-interno"><div class="display" id="pressV">0.00</div><div class="bar-wrap"><div id="pressB" class="bar-fill"></div></div></div>
            <div class="card-controls">
                <button id="pressTgl" onclick="toggleSensor('press')" class="btn-toggle btn-active">ON</button>
                <div id="pressA" class="alarm"></div>
            </div>
        </div>

        <div class="instrument">
            <div class="label">NÍVEL (%)</div>
            <div class="visor-interno"><div class="display" id="nivelV">0.0</div><div class="bar-wrap"><div id="nivelB" class="bar-fill"></div></div></div>
            <div class="card-controls">
                <button id="nivelTgl" onclick="toggleSensor('nivel')" class="btn-toggle btn-active">ON</button>
                <div id="nivelA" class="alarm"></div>
            </div>
        </div>

        <div class="instrument">
            <div class="label">PRESENÇA</div>
            <div class="visor-interno"><div class="display" id="presV" style="text-align:center; font-size:1.1rem;">OK</div></div>
            <div class="card-controls">
                <button id="presTgl" onclick="toggleSensor('pres')" class="btn-toggle btn-active">ON</button>
                <div id="presA" class="alarm"></div>
            </div>
        </div>
    </div>

    <div class="footer-btns">
        <button class="btn-secondary" onclick="generatePDF()">📄 PDF</button>
        <button class="btn-secondary" onclick="document.getElementById('modal').style.display='flex'">⚙️ CONFIG</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <label>SP GÁS</label><input type="number" id="s1">
        <label>SP TEMP</label><input type="number" id="s2">
        <label>SP VAZÃO</label><input type="number" id="s3">
        <label>SP PRESS</label><input type="number" id="s4" step="0.1">
        <label>SP NÍVEL</label><input type="number" id="s5">
        <label>ZERO GÁS</label><input type="number" id="s6">
        <button onclick="save()" style="background:var(--purple); color:white; width:100%;">SALVAR</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="background:none; color:#888; width:100%; margin-top:5px;">VOLTAR</button>
    </div>
</div>

<script>
    const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");
    let espTimeout = null, audioCtx = null, sirenInterval = null, isMuted = false;
    const sensorStatus = { gas: true, temp: true, flow: true, press: true, nivel: true, pres: true };

    function initAudio() { 
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
    }

    // ==================== FULLSCREEN ====================
    function toggleFullscreen() {
        const btn = document.getElementById('fullBtn');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().then(() => {
                btn.innerHTML = '⤢'; // ícone de sair
            }).catch(err => console.log(err));
        } else {
            document.exitFullscreen().then(() => {
                btn.innerHTML = '⛶';
            });
        }
    }

    // Atualiza ícone ao entrar/sair do fullscreen manualmente
    document.addEventListener('fullscreenchange', () => {
        const btn = document.getElementById('fullBtn');
        btn.innerHTML = document.fullscreenElement ? '⤢' : '⛶';
    });

    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById('muteBtn').style.background = isMuted ? 'var(--red)' : '#1f1f22';
        client.publish("casa/set/mute", isMuted ? "1" : "0");
        checkSirenStatus();
    }

    function toggleSensor(type) {
        sensorStatus[type] = !sensorStatus[type];
        const btn = document.getElementById(type + 'Tgl');
        const alarmDiv = document.getElementById(type + 'A');
        if(sensorStatus[type]) {
            btn.innerText = "ON"; btn.classList.add('btn-active');
        } else {
            btn.innerText = "OFF"; btn.classList.remove('btn-active');
            alarmDiv.classList.remove('alarm-on');
        }
        client.publish(`casa/set/${type}_on`, sensorStatus[type] ? "1" : "0");
        checkSirenStatus();
    }

    function checkSirenStatus() {
        const anyAlarm = document.querySelectorAll('.alarm-on').length > 0;
        if (!anyAlarm || isMuted) {
            if(sirenInterval) { clearInterval(sirenInterval); sirenInterval = null; }
        } else { playSiren(); }
        if (!anyAlarm) { client.publish("casa/set/mute", "1"); }
        else if (!isMuted) { client.publish("casa/set/mute", "0"); }
    }

    function playSiren() {
        initAudio();
        if (!sirenInterval && audioCtx) {
            sirenInterval = setInterval(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = (Math.floor(Date.now()/400)%2==0) ? 950 : 650;
                osc.connect(gain); gain.connect(audioCtx.destination);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }, 400);
        }
    }

    // MQTT
    client.on("connect", () => document.getElementById('webLed').classList.add('online'));
    client.on("message", (t, m) => {
        document.getElementById('espLed').classList.add('online');
        clearTimeout(espTimeout);
        espTimeout = setTimeout(() => document.getElementById('espLed').classList.remove('online'), 2000);
        
        const val = m.toString();
        const num = parseFloat(val);

        if(t.includes("gas")) {
            const sp = parseInt(document.getElementById('s1').value) || 2000;
            const real = Math.max(0, num - (parseInt(document.getElementById('s6').value)||0));
            document.getElementById('gasV').innerText = real.toString().padStart(4, '0');
            document.getElementById('gasB').style.width = Math.min((real/sp)*100, 100) + "%";
            document.getElementById('gasA').classList.toggle('alarm-on', real >= sp && sensorStatus.gas);
        } else if(t.includes("temp")) {
            const sp = parseFloat(document.getElementById('s2').value) || 50;
            document.getElementById('tempV').innerText = num.toFixed(1);
            document.getElementById('tempB').style.width = Math.min((num/sp)*100, 100) + "%";
            document.getElementById('tempA').classList.toggle('alarm-on', num >= sp && sensorStatus.temp);
        } else if(t.includes("fluxo")) {
            const sp = parseFloat(document.getElementById('s3').value) || 10;
            document.getElementById('flowV').innerText = num.toFixed(1);
            document.getElementById('flowB').style.width = Math.min((num/sp)*100, 100) + "%";
            document.getElementById('flowA').classList.toggle('alarm-on', num >= sp && sensorStatus.flow);
        } else if(t.includes("pressao")) {
            const sp = parseFloat(document.getElementById('s4').value) || 4;
            document.getElementById('pressV').innerText = num.toFixed(2);
            document.getElementById('pressB').style.width = Math.min((num/sp)*100, 100) + "%";
            document.getElementById('pressA').classList.toggle('alarm-on', num >= sp && sensorStatus.press);
        } else if(t.includes("nivel")) {
            const sp = parseFloat(document.getElementById('s5').value) || 80;
            document.getElementById('nivelV').innerText = num.toFixed(1);
            document.getElementById('nivelB').style.width = Math.min(num, 100) + "%";
            document.getElementById('nivelA').classList.toggle('alarm-on', num >= sp && sensorStatus.nivel);
        } else if(t.includes("presenca")) {
            const det = (val === "DETECTADO");
            document.getElementById('presV').innerText = det ? "ALERT" : "OK";
            document.getElementById('presV').style.color = det ? "#ff2d55" : "#00f5ff";
            document.getElementById('presA').classList.toggle('alarm-on', det && sensorStatus.pres);
        }
        checkSirenStatus();
    });

    client.subscribe(["casa/gas/vazamento", "casa/temp/ambiente", "casa/fluxo/agua", "casa/pressao/agua", "casa/nivel/caixa", "casa/presenca/status"]);

    function save() {
        const config = {s1:'gas', s2:'temp', s3:'fluxo', s4:'pressao', s5:'nivel', s6:'base'};
        for(let id in config) {
            const val = document.getElementById(id).value;
            localStorage.setItem('wellguard_v10_'+id, val);
            client.publish('casa/set/' + config[id], val);
        }
        document.getElementById('modal').style.display = 'none';
    }

    window.onload = () => {
        const keys = ['s1','s2','s3','s4','s5','s6'];
        const defaults = [2000, 50, 10, 4, 80, 0];
        keys.forEach((k, i) => document.getElementById(k).value = localStorage.getItem('wellguard_v10_'+k) || defaults[i]);
    };

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("RELATORIO WELLGUARD PRO X", 20, 20);
        doc.save("Relatorio.pdf");
    }
</script>
</body>
</html>
